<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="Homepage.css">
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <a href="Homepage.html">
                    <span class="logo-text">365<br>Code</span>
                </a>
                <i class="bx bx-menu-alt-right btn-menu"></i>
            </div>

            <div class="menu">
                <ul>
                    <li><i class='bx bx-home'></i><a href="#">Home</a></li>
                    <li><i class='bx bx-code-block'></i><a href="#">Source Code</a></li>
                    <li><i class='bx bx-notepad'></i><a href="#">Services</a></li>
                    <li><i class='bx bx-hive'></i><a href="#">Premium Version</a></li>
                </ul>
            </div>

            <div class="auth-menu">
                <ul>
                    <li><i class='bx bx-log-in'></i><a href="#">Login</a></li>
                    <li><i class='bx bx-user-plus'></i><a href="#">Sign Up</a></li>
                </ul>
            </div>
        </div>
        <!-- End Sidebar -->
        <!-- Content -->
        <div class="content-container">
            <div class="calendar">
                <div class="calendar-header">
                  <button id="prevMonth">&lt;</button>
                  <h1 id="currentMonthYear"></h1>
                  <button id="nextMonth">&gt;</button>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
              </div>
            <button onclick="toggleDarkMode()" class="dlb">Toggle Dark Mode</button>
        </div>        
        
    </div>
    
    <script src="Homepage.js"></script>
</body>

</html>
