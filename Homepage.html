<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="Homepage.css">

</head>

<body>
    <!-- SideBar -->

    <div class="sidebar">
        <div class="logo">
            <a href="Homepage.html">
                <span class="logo-text">365<br>Code</span>
            </a>
            <i class="bx bx-menu-alt-right btn-menu"></i>
        </div>

        <div class="menu">
            <ul>
                <li><i class='bx bx-home'></i><a href="#">Home</a></li>
                <li><i class='bx bx-code-block'></i><a href="#">Source Code</a></li>
                <li><i class='bx bx-notepad'></i><a href="#">Services</a></li>
                <li><i class='bx bx-hive'></i><a href="#">Premium Version</a></li>
            </ul>
        </div>
        <div class="auth-menu">
            <ul>
                <li><i class='bx bx-log-in'></i><a href="#">Login</a></li>
                <li><i class='bx bx-user-plus'></i><a href="#">Sign Up</a></li>
            </ul>
        </div>
    </div>
    <!-- EndSideBar -->
    <div class="content">
        <div class="posts-container">
            <!-- Post 1 -->
            <div class="post">
                <div class="post-header">
                    <div class="post-avatar">
                        <img src="avatar1.jpg" alt="User Avatar">
                    </div>
                    <p class="post-username">john_doe123</p>
                </div>
                <div class="post-content">
                    <div class="post-image">
                        <img src="post1.jpg" alt="Post Image">
                    </div>
                    <div class="post-actions">
                        <i class="bx bx-like"></i>
                        <i class="bx bx-comment"></i>
                    </div>
                </div>
            </div>

            <!-- Post 2 -->
            <div class="post">
                <div class="post-header">
                    <div class="post-avatar">
                        <img src="avatar2.jpg" alt="User Avatar">
                    </div>
                    <p class="post-username">coding_master</p>
                </div>
                <div class="post-content">
                    <p>Just finished a coding marathon! 💻🚀 #coding #programming</p>
                    <!-- No image in this post -->
                    <div class="post-actions">
                        <i class="bx bx-like"></i>
                        <i class="bx bx-comment"></i>
                    </div>
                </div>
            </div>

            <!-- New Post Form -->
            <div class="post">
                <div class="post-header">
                    <div class="post-avatar">
                        <img src="your_avatar.jpg" alt="User Avatar">
                    </div>
                    <p class="post-username">your_username</p>
                </div>
                <div class="post-content">
                    <textarea id="newPostText" placeholder="What's on your mind?"></textarea>
                    <button id="submitPost">Post</button>
                </div>
            </div>
        </div>
    </div>

    <script src="Homepage.js"></script>
</body>

</html>
